# v2.1.5: builtin (wheel-shipped) _system.yaml は空でリリースする。
#
# v2.1.4 では `_system.example.yaml` を流用していたため、wheel
# fallback が選択された環境で架空 alias / group / unit
# (psu001 → GPIB0::6::INSTR 等) が production API に出てしまう
# 問題があった。
#
# 利用者は v2.1.5 以降、運用環境で alias / bus / group / unit を
# 使いたい場合のみ `<repo>/instruments/_system.yaml` か
# `VISA_MCP_INSTRUMENTS_DIR/_system.yaml` を作成する。
# 雛形例は repository の `instruments/_system.example.yaml` を参照。

instruments: {}
buses: {}
instrument_groups: {}
experiment_units: {}
